<!DOCTYPE html>
<html class="scroll-smooth dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>NASA 70 - Projects Archive</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&amp;family=Inter:wght@400;500;700&amp;family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#b8c8dd",
                        error: "#ffb4ab",
                        "surface-container-highest": "#333535",
                        outline: "#8e9196",
                        "on-tertiary": "#2f3131",
                        "on-tertiary-fixed": "#1a1c1c",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-secondary-fixed-variant": "#930016",
                        "primary-container": "#102030",
                        "on-background": "#e2e2e2",
                        "on-secondary-fixed": "#410005",
                        "surface-container": "#1e2020",
                        "on-error": "#690005",
                        "primary-fixed": "#d4e4fa",
                        "inverse-on-surface": "#2f3131",
                        "surface-container-high": "#282a2b",
                        "outline-variant": "#44474c",
                        "on-primary-fixed": "#0c1d2d",
                        tertiary: "#c6c6c7",
                        "on-primary-container": "#78889c",
                        "tertiary-fixed": "#e2e2e2",
                        surface: "#121414",
                        "secondary-fixed": "#ffdad7",
                        "on-tertiary-container": "#858787",
                        background: "#121414",
                        "tertiary-container": "#1d1f1f",
                        "on-primary-fixed-variant": "#39485a",
                        "on-tertiary-fixed-variant": "#454747",
                        "surface-dim": "#121414",
                        "secondary-fixed-dim": "#ffb3ae",
                        "on-surface-variant": "#c4c6cc",
                        "primary-fixed-dim": "#b8c8dd",
                        "surface-bright": "#38393a",
                        "on-secondary": "#68000c",
                        "inverse-surface": "#e2e2e2",
                        "secondary-container": "#a4031a",
                        "on-surface": "#e2e2e2",
                        "inverse-primary": "#506072",
                        "on-error-container": "#ffdad6",
                        secondary: "#ffb3ae",
                        "surface-variant": "#333535",
                        "on-primary": "#223242",
                        "on-secondary-container": "#ffaea8",
                        "surface-tint": "#b8c8dd",
                        "surface-container-lowest": "#0c0f0f",
                        "surface-container-low": "#1a1c1c",
                        "error-container": "#93000a",
                        "nasa-red": "#E03A3E"
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        lg: "1rem",
                        xl: "1.5rem",
                        full: "9999px"
                    },
                    spacing: {
                        margin: "32px",
                        unit: "4px",
                        "container-max-width": "1440px",
                        gutter: "24px"
                    },
                    fontFamily: {
                        "display-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Public Sans", "sans-serif"],
                        "body-md": ["Public Sans", "sans-serif"],
                        "label-sm": ["DM Mono"],
                        "label-md": ["DM Mono"],
                        "code-md": ["DM Mono"],
                        sans: ["Public Sans", "ui-sans-serif", "system-ui"],
                        mono: ["DM Mono", "ui-monospace"],
                        headline: ["Inter"],
                        display: ["Inter"],
                        body: ["Public Sans", "sans-serif"],
                        label: ["DM Mono"]
                    },
                    fontSize: {
                        "label-sm": ["12px", {lineHeight: "16px", letterSpacing: "0.08em", fontWeight: "500"}],
                        "display-lg": ["48px", {lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700"}],
                        "code-md": ["14px", {lineHeight: "20px", fontWeight: "400"}],
                        "headline-lg": ["32px", {lineHeight: "40px", fontWeight: "600"}],
                        "body-lg": ["18px", {lineHeight: "28px", fontWeight: "400"}],
                        "body-md": ["16px", {lineHeight: "24px", fontWeight: "400"}],
                        "label-md": ["14px", {lineHeight: "20px", letterSpacing: "0.05em", fontWeight: "500"}],
                        "headline-md": ["24px", {lineHeight: "32px", fontWeight: "600"}]
                    }
                }
            }
        };
    </script>
    <style data-purpose="custom-styles">
        body {
            background-color: #121414;
            color: #e2e2e2;
            font-family: theme('fontFamily.sans');
            -webkit-font-smoothing: antialiased;
        }
        
        .tech-label {
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        .search-input {
            background-color: #1a1c1c !important;
            border: 1px solid #44474c !important;
            border-radius: 9999px;
            color: #e2e2e2 !important;
            padding: 0.6rem 0.75rem 0.6rem 2.25rem !important;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }
        .search-input::placeholder {
            color: #8e9196 !important;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 11px;
        }
        .search-input:focus {
            outline: none !important;
            border-color: #E03A3E !important;
            box-shadow: 0 0 0 1px rgba(224, 58, 62, 0.15) !important;
            background-color: #1e2020 !important;
        }
        
        .card-border-treatment {
            border: 1px solid theme('colors.outline-variant');
            background: theme('colors.surface-container-low');
            transition: all 0.3s ease;
        }
        
        .card-border-treatment:hover {
            border-color: theme('colors.primary');
            box-shadow: 0 0 20px rgba(184, 200, 221, 0.05);
        }

        .halftone-img {
            filter: grayscale(100%) contrast(1.1);
            mix-blend-mode: luminosity;
            transition: all 0.5s ease;
        }
        .group:hover .halftone-img {
            filter: grayscale(0%) contrast(1.0);
            mix-blend-mode: normal;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: theme('colors.surface-container-low');
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: theme('colors.outline-variant');
        }
        .hidden-card {
            display: none !important;
        }
        .tag-chip {
            transition: all 0.2s ease;
        }
        .tag-active {
            background-color: #E03A3E;
            color: white !important;
            border-color: #E03A3E;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-background text-on-background">

<!-- Header placeholder -->
<div id="site-header"></div>

<main class="flex-grow flex flex-col md:flex-row px-8 py-12 gap-12 max-w-[1920px] mx-auto w-full">
    <!-- Sidebar Filters -->
    <aside class="w-full md:w-64 flex-shrink-0 space-y-10">
        <!-- Search Section -->
        <div>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-base">search</span>
                <input id="searchInput" class="search-input w-full focus:ring-0 rounded-full" placeholder="Search archive..." type="text">
            </div>
        </div>
        
        <!-- Reset Filters -->
        <div>
            <button id="resetFiltersBtn" class="tech-label text-[10px] font-bold border-b border-nasa-red border-dashed pb-1 text-nasa-red hover:opacity-80 transition-opacity">Reset Filters</button>
        </div>
        
        <!-- TAG MACRO Filter -->
        <div>
            <h2 class="tech-label text-[10px] font-bold text-on-surface-variant mb-4">TAG MACRO</h2>
            <div class="space-y-3">
                <div class="flex flex-wrap gap-2" id="macroContainer">
                    <!-- Dynamic statuses injected by JS -->
                </div>
            </div>
        </div>
        
        <!-- TAG MICRO Filter -->
        <div class="max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
            <div class="flex items-center justify-between mb-4 sticky top-0 bg-surface z-10 gap-2">
                <h2 class="tech-label text-[10px] font-bold text-on-surface-variant" style="margin-right: 30px;">TAG MICRO</h2>
                <div class="relative flex-1 pr-4">
                    <span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-nasa-red text-xs pointer-events-none">search</span>
                    <input id="microSearchInput" class="w-full bg-transparent border-none outline-none pl-5" placeholder="Search" type="text" style="border-bottom: 1px dashed #E03A3E;">
                </div>
            </div>
            <div class="flex flex-wrap gap-2" id="microContainer">
                <!-- Dynamic types injected by JS -->
            </div>
        </div>
    </aside>
    
    <!-- Main Grid Area -->
    <div class="flex-grow">
        <!-- Page Title & Results Count -->
        <div class="mb-10 pb-6 border-b border-outline-variant flex justify-between items-baseline flex-wrap gap-4">
            <h1 class="text-4xl font-bold tracking-tight text-on-surface uppercase font-display">Projects</h1>
            <div class="flex items-center gap-4">
                <div class="relative" id="sortDropdown">
                    <button id="sortBtn" class="flex items-center justify-center w-10 h-10 bg-surface-container-low border border-outline-variant text-on-surface rounded-full hover:border-nasa-red transition-all cursor-pointer">
                        <span class="material-symbols-outlined text-lg">swap_vert</span>
                    </button>
                    <div id="sortMenu" class="hidden absolute right-0 mt-2 bg-surface-container-low border border-outline-variant rounded-xl shadow-lg z-50 min-w-[140px] overflow-hidden">
                        <button data-sort="shuffle" class="sort-option w-full text-left px-4 py-2.5 tech-label text-[10px] font-bold text-on-surface hover:bg-nasa-red hover:text-white transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined text-base">shuffle</span> SHUFFLE
                        </button>
                        <button data-sort="alpha-az" class="sort-option w-full text-left px-4 py-2.5 tech-label text-[10px] font-bold text-on-surface hover:bg-nasa-red hover:text-white transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined text-base">sort_by_alpha</span> A-Z
                        </button>
                        <button data-sort="alpha-za" class="sort-option w-full text-left px-4 py-2.5 tech-label text-[10px] font-bold text-on-surface hover:bg-nasa-red hover:text-white transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined text-base">sort_by_alpha</span> Z-A
                        </button>
                        <button data-sort="chrono-new" class="sort-option w-full text-left px-4 py-2.5 tech-label text-[10px] font-bold text-on-surface hover:bg-nasa-red hover:text-white transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined text-base">schedule</span> NEWEST
                        </button>
                        <button data-sort="chrono-old" class="sort-option w-full text-left px-4 py-2.5 tech-label text-[10px] font-bold text-on-surface hover:bg-nasa-red hover:text-white transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined text-base">history</span> OLDEST
                        </button>
                    </div>
                </div>
                <div class="text-sm font-bold tech-label text-on-surface-variant" id="resultsCount">Establishing Link...</div>
            </div>
        </div>
        <!-- Results Grid (Masonry Columns) -->
        <div class="flex gap-8" id="archive-grid">
            <!-- Dynamic cards injected by JS -->
        </div>
    </div>
</main>
    <!-- Footer placeholder -->
    <div id="site-footer"></div>

<script src="components.js"></script>
<script src="archive-app.js?v=20260520_v2"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('site-header').outerHTML = renderHeader({ activePage: 'archive', aboutHref: 'index.html#about-project' });
        document.getElementById('site-footer').outerHTML = renderFooter({ aboutHref: 'index.html#about-project' });
    });
</script>
</body>
</html>
